name: mentora
description: Mentora - Your AI-powered project teammate
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12

  # UI
  google_fonts: ^6.2.1
  provider: ^6.1.2

  # Storage & Prefs
  shared_preferences: ^2.3.3
  path_provider: ^2.1.4

  # Localization
  intl: ^0.20.2

  # Media
  image_picker: ^1.1.2
  file_picker: ^8.1.2

  # ML Kit
  google_mlkit_barcode_scanning: ^0.12.0
  google_mlkit_text_recognition: ^0.13.0

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0

  # PDF
  pdf: ^3.11.1
  open_file: ^3.3.2

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
